<!DOCTYPE html>
<html
        xmlns:th="http://www.thymeleaf.org"
        xmlns:tc="https://github.com/Serbroda/thymeleaf-component-dialect"
>
<head>
    <link
            rel="stylesheet"
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            crossorigin="anonymous">
    <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
            crossorigin="anonymous">

    <script
            src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
            crossorigin="anonymous"></script>

    <title>Thymeleaf Component Dialect - Demo</title>
</head>
<body>

<tc:menu>
    <tc:menu-item text="Home" active href="@{/}" class/>
    <tc:menu-item text="'GitHub: Code'" href="'https://github.com/Serbroda/thymeleaf-component-dialect'" icon="'link'" blank/>
    <tc:menu-item text="'GitHub: Demo'" href="'https://github.com/Serbroda/thymeleaf-component-dialect-demo'" icon="'link'"
                  blank/>
</tc:menu>

<div class="container">
    <br>
    <h1>Thymeleaf Component Dialect - Demo</h1>

    <br>
    <!-- Panel with custom footer slot (header uses default from title param) -->
    <tc:panel tc:constructor="'Countries'" th:if="${countries != null}">
        <tc:slot name="footer">
            <small class="text-muted"><i class="fa-solid fa-globe"></i> [[${#sets.size(countries)}]] countries
                registered</small>
        </tc:slot>

        <form th:action="@{/country/add}" method="post" th:object="${country}" style="margin-bottom: 10px">
            <tc:floating tc:constructor="'ISO CODE'" md="4">
                <input type="text" class="form-control" th:field="*{isoCode}" placeholder="ISO CODE"
                       required="required"/>
            </tc:floating>
            <tc:valid-input tc:repl-field="name" title="Name"/>
            <button type="submit" class="btn btn-primary mt-2">Add country</button>
        </form>

        <tc:button-group>
            <tc:button
                    th:each="country : ${countries}"
                    id="${country.isoCode}"
                    type="light"
                    click="'logAndAlert(\'' + ${country.name} + '\')'">
                <span><i class="fa-solid fa-globe"></i> [[${country.name}]]</span>
            </tc:button>
        </tc:button-group>
    </tc:panel>

    <br>

    <!-- Panel with custom header and footer slots -->
    <tc:panel tc:constructor="'Info'">
        <tc:slot name="header">
            <i class="fa-solid fa-circle-info"></i> <b>About Named Slots</b>
        </tc:slot>
        <tc:slot name="footer">
            <a href="https://github.com/Serbroda/thymeleaf-component-dialect" target="_blank">
                <i class="fa-solid fa-book"></i> Documentation
            </a>
        </tc:slot>
        <p>This panel uses <strong>named slots</strong> to customize both the header and footer.</p>
        <p>The default slot contains this body content.</p>
    </tc:panel>

    <br>
    <tc:console></tc:console>

    <tc:label text="Test1"></tc:label>
    <tc:label text="Test2"></tc:label>
    <tc:label text="Test3"></tc:label>

</div>
</body>
</html>
