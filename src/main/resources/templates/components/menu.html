<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:tc="https://github.com/Serbroda/thymeleaf-component-dialect">
<head>
</head>
<body>
	
    <nav th:fragment="menu" class="navbar navbar-expand-lg navbar-light bg-light">
      <div class="container-fluid">
        <div class="navbar-header">
          <a class="navbar-brand" href="#">WebSiteName</a>
        </div>
        <ul class="navbar-nav me-auto">
          <tc:content/>
        </ul>
      </div>
    </nav>
    
    <li
        th:fragment="menu-item"
        class="nav-item"
        th:classappend="${active != null and active ? 'active' : ''}">
        <a
            class="nav-link"
            th:href="${href != null ? href : '#'}"
            th:target="${blank != null and blank ? '_blank' : ''}">
            <i th:if="${icon != null}" class="fa-solid" th:classappend="${'fa-' + icon}"></i>
            [[${text}]]
        </a>
    </li>
    
</body>
</html>
